name: posipv
description: Offline-first POS and inventory app
publish_to: 'none'
version: 0.3.1+6

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0
  uuid: ^4.5.1
  crypto: ^3.0.7
  image_picker: ^1.1.2
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0
  pdf: ^3.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.20.3
  build_runner: ^2.4.12
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon_adaptive_fg.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
